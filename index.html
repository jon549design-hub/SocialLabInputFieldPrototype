<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Social Lab — Input Field Prototype</title>

<!--
  ┌──────────────────────────────────────────────────────────────────────┐
  │  Claude-style chat composer — prototype base                           │
  │                                                                        │
  │  A faithful recreation of the Claude input field (the composer) with   │
  │  a minimal chat area around it. Built as a single self-contained file  │
  │  so each interaction experiment can be forked independently.           │
  │                                                                        │
  │  Where to build your interactions:                                     │
  │   • Composer markup .......... <form id="composer"> below              │
  │   • Send / message flow ...... sendMessage() in the <script>           │
  │   • Fake assistant reply ..... respond() — swap for a real API later   │
  │   • Theme tokens ............. :root and [data-theme="dark"] in CSS    │
  └──────────────────────────────────────────────────────────────────────┘
-->

<style>
  /* ───────────────────────────  Design tokens  ─────────────────────────── */
  :root {
    /* Warm "ivory" palette matching Claude's light theme */
    --bg:            #faf9f5;
    --surface:       #ffffff;
    --user-bubble:   #f0eee6;
    --text:          #1f1e1d;
    --text-muted:    #73726c;
    --text-faint:    #a3a299;
    --border:        rgba(31, 30, 29, 0.10);
    --border-strong: rgba(31, 30, 29, 0.16);
    --hover:         rgba(31, 30, 29, 0.05);
    --accent:        #d97757;   /* Claude coral */
    --accent-text:   #ffffff;
    --shadow:        0 2px 12px rgba(31, 30, 29, 0.06),
                     0 1px 3px rgba(31, 30, 29, 0.04);

    --font-sans: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
                 Roboto, Helvetica, Arial, sans-serif;
    --font-serif: "Tiempos", Georgia, "Times New Roman", serif;

    --composer-radius: 26px;
    --max-width: 740px;
  }

  [data-theme="dark"] {
    --bg:            #262624;
    --surface:       #30302e;
    --user-bubble:   #3a3a37;
    --text:          #f5f4ee;
    --text-muted:    #b4b3ac;
    --text-faint:    #82817b;
    --border:        rgba(255, 255, 255, 0.12);
    --border-strong: rgba(255, 255, 255, 0.18);
    --hover:         rgba(255, 255, 255, 0.07);
    --shadow:        0 2px 14px rgba(0, 0, 0, 0.30);
  }

  /* ───────────────────────────────  Reset  ─────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }

  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  /* ───────────────────────────────  Layout  ────────────────────────────── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    width: 100%;
  }

  /* Slim top bar — kept minimal; the composer is the focus */
  .topbar {
    flex: 0 0 auto;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
  }
  .topbar .brand {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-muted);
  }
  .topbar .brand .spark { width: 20px; height: 20px; }

  .icon-btn {
    width: 36px; height: 36px;
    display: grid; place-items: center;
    border-radius: 9px;
    color: var(--text-muted);
    transition: background .15s ease, color .15s ease;
  }
  .icon-btn:hover { background: var(--hover); color: var(--text); }
  .icon-btn svg { width: 20px; height: 20px; }

  /* Scrollable conversation region */
  .main {
    flex: 1 1 auto;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    scrollbar-width: thin;
    scrollbar-color: var(--border-strong) transparent;
  }
  .main::-webkit-scrollbar { width: 8px; }
  .main::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

  /* The centered column that holds the greeting, messages and composer.
     It's a flex column so we can vertically centre everything in the empty
     state, then switch to a top-aligned conversation layout on first send. */
  .column {
    width: 100%;
    max-width: var(--max-width);
    min-height: 100%;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
  }
  /* Empty state: centre the greeting + composer group vertically. */
  body:not(.is-conversation) .column { justify-content: center; }

  /* ─────────────────────  "New chat" greeting state  ───────────────────── */
  /* The app starts empty: greeting + composer centered vertically.          */
  /* On first send we add .is-conversation to <body> and it reflows.          */
  .greeting {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    margin-bottom: 26px;
  }
  .greeting .spark-lg { width: 46px; height: 46px; }
  .greeting h1 {
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: clamp(26px, 5vw, 34px);
    letter-spacing: -0.01em;
    text-align: center;
  }
  body.is-conversation .greeting { display: none; }

  /* ───────────────────────────  Messages  ──────────────────────────────── */
  .messages {
    display: none;            /* shown once a conversation starts */
    flex-direction: column;
    gap: 22px;
    padding: 28px 0 12px;
  }
  /* flex:1 pushes the docked composer to the bottom when messages are short */
  body.is-conversation .messages { display: flex; flex: 1 1 auto; }

  .msg { display: flex; gap: 14px; align-items: flex-start; }

  /* User turn: right-aligned cream bubble */
  .msg.user { justify-content: flex-end; }
  .msg.user .bubble {
    background: var(--user-bubble);
    padding: 12px 16px;
    border-radius: 16px 16px 4px 16px;
    max-width: 78%;
    line-height: 1.55;
    font-size: 15.5px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  /* Assistant turn: spark avatar + plain flowing text */
  .msg.assistant .avatar {
    flex: 0 0 auto;
    width: 26px; height: 26px;
    display: grid; place-items: center;
    margin-top: 1px;
  }
  .msg.assistant .avatar svg { width: 24px; height: 24px; }
  .msg.assistant .body {
    line-height: 1.65;
    font-size: 15.5px;
    padding-top: 1px;
    max-width: calc(100% - 40px);
  }

  /* Typing indicator (three pulsing dots) */
  .typing { display: inline-flex; gap: 4px; align-items: center; height: 24px; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-faint);
    animation: blink 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 60%, 100% { opacity: .25; } 30% { opacity: 1; } }

  /* ──────────────────────  Composer (the input field)  ─────────────────── */
  /* Empty state: the composer sits in the centred greeting group.           */
  /* Conversation: it sticks to the bottom of the scroll area, with a soft   */
  /* background fade so messages scroll underneath it.                       */
  .composer-wrap {
    flex: 0 0 auto;
    width: 100%;
  }
  body.is-conversation .composer-wrap {
    position: sticky;
    bottom: 0;
    padding-bottom: 18px;
    background: linear-gradient(to bottom, transparent, var(--bg) 22%);
  }

  .composer {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--composer-radius);
    box-shadow: var(--shadow);
    padding: 14px 14px 10px;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .composer:focus-within {
    border-color: var(--border-strong);
    box-shadow: 0 4px 20px rgba(31, 30, 29, 0.10), 0 1px 3px rgba(31, 30, 29, 0.05);
  }

  /* The growing textarea */
  .composer textarea {
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    background: transparent;
    color: var(--text);
    font-size: 16px;
    line-height: 1.5;
    max-height: 220px;
    padding: 4px 6px 6px;
    font-family: inherit;
  }
  .composer textarea::placeholder { color: var(--text-faint); }

  /* Bottom toolbar inside the composer */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-top: 4px;
  }
  .toolbar .group { display: flex; align-items: center; gap: 6px; }

  /* Round bordered "+" button */
  .tool {
    height: 34px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 0 11px;
    font-size: 14px;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .tool.circle { width: 34px; padding: 0; justify-content: center; }
  .tool:hover { background: var(--hover); color: var(--text); border-color: var(--border-strong); }
  .tool svg { width: 18px; height: 18px; }

  /* Model selector */
  .model {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    height: 34px;
    padding: 0 6px 0 10px;
    border-radius: 999px;
    color: var(--text-muted);
    font-size: 14px;
    transition: background .15s ease, color .15s ease;
    white-space: nowrap;
  }
  .model:hover { background: var(--hover); color: var(--text); }
  .model .chev { width: 16px; height: 16px; }

  /* Send button — gray when empty, coral when there's text */
  .send {
    width: 34px; height: 34px;
    border-radius: 999px;
    display: grid; place-items: center;
    background: var(--border-strong);
    color: var(--surface);
    transition: background .15s ease, transform .12s ease, opacity .15s ease;
  }
  .send svg { width: 18px; height: 18px; }
  .send:disabled { cursor: default; opacity: .55; }
  body.has-text .send { background: var(--accent); color: var(--accent-text); }
  body.has-text .send:hover { transform: scale(1.06); }
  .send:active { transform: scale(0.94); }

  /* Helper line under the composer */
  .hint {
    text-align: center;
    font-size: 12px;
    color: var(--text-faint);
    margin-top: 9px;
    min-height: 16px;
  }
  body.is-conversation .hint { display: none; }

  /* Dropdown menu (model picker) */
  .menu {
    position: absolute;
    bottom: calc(100% + 8px);
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 6px;
    min-width: 230px;
    display: none;
    z-index: 20;
  }
  .menu.open { display: block; }
  .menu .item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    width: 100%;
    text-align: left;
    padding: 9px 11px;
    border-radius: 9px;
    font-size: 14px;
    color: var(--text);
  }
  .menu .item:hover { background: var(--hover); }
  .menu .item small { display: block; color: var(--text-muted); font-size: 12px; margin-top: 2px; }
  .menu .item .check { width: 16px; height: 16px; color: var(--accent); opacity: 0; flex: 0 0 auto; }
  .menu .item[aria-checked="true"] .check { opacity: 1; }
  .model-field { position: relative; }

  /* ─────────────────────────────  Mobile  ──────────────────────────────── */
  @media (max-width: 640px) {
    .column { padding: 0 14px; }
    .greeting h1 { font-size: 24px; }
    .greeting .spark-lg { width: 40px; height: 40px; }
    .composer { border-radius: 22px; padding: 12px 12px 9px; }
    .composer textarea { font-size: 16px; }   /* keep 16px so iOS doesn't zoom */
    body.is-conversation .composer-dock {
      padding-bottom: max(14px, env(safe-area-inset-bottom));
    }
    .model .label-full { display: none; }       /* shorten model name */
    .tool .label { display: none; }             /* icon-only tools on mobile */
    .tool { padding: 0 9px; }
    .msg.user .bubble { max-width: 86%; }
  }
</style>
</head>
<body>
  <div class="app">

    <!-- ─────────────────────────  Top bar  ───────────────────────── -->
    <header class="topbar">
      <div class="brand">
        <!-- Claude spark logo -->
        <svg class="spark" viewBox="0 0 24 24" aria-hidden="true">
          <use href="#spark" />
        </svg>
        <span>Claude</span>
      </div>
      <button class="icon-btn" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path>
        </svg>
      </button>
    </header>

    <!-- ───────────────────────  Conversation  ─────────────────────── -->
    <main class="main" id="main">
      <div class="column">

        <!-- New-chat greeting (hidden once a conversation begins) -->
        <section class="greeting" id="greeting">
          <svg class="spark-lg" viewBox="0 0 24 24" aria-hidden="true"><use href="#spark" /></svg>
          <h1 id="greetingText">How can I help you today?</h1>
        </section>

        <!-- Message list -->
        <section class="messages" id="messages" aria-live="polite"></section>

        <!-- ──────────────────  Composer (input field)  ────────────── -->
        <div class="composer-wrap">
          <form class="composer" id="composer" autocomplete="off">
          <textarea id="input" rows="1" placeholder="How can I help you today?"
                    aria-label="Message Claude"></textarea>

          <div class="toolbar">
            <!-- Left: attach + tools -->
            <div class="group">
              <button type="button" class="tool circle" id="attach" title="Attach" aria-label="Attach">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 5v14M5 12h14"></path>
                </svg>
              </button>
              <button type="button" class="tool" id="tools" title="Tools">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 6h11M4 12h7M4 18h13"></path>
                  <circle cx="19" cy="6" r="2"></circle>
                  <circle cx="15" cy="12" r="2"></circle>
                  <circle cx="20" cy="18" r="2"></circle>
                </svg>
                <span class="label">Tools</span>
              </button>
            </div>

            <!-- Right: model picker + send -->
            <div class="group">
              <div class="model-field">
                <button type="button" class="model" id="modelBtn" aria-haspopup="true" aria-expanded="false">
                  <span><span class="label-full">Claude </span><span id="modelName">Sonnet 4.6</span></span>
                  <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 9l6 6 6-6"></path>
                  </svg>
                </button>

                <div class="menu" id="modelMenu" role="menu"></div>
              </div>

              <button type="submit" class="send" id="send" title="Send" aria-label="Send message" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 19V5M5 12l7-7 7 7"></path>
                </svg>
              </button>
            </div>
          </div>
        </form>

          <p class="hint">Claude can make mistakes. This is a prototype — replies are simulated.</p>
        </div><!-- /.composer-wrap -->

      </div><!-- /.column -->
    </main>
  </div><!-- /.app -->

  <!-- ───────────────  Shared SVG: the Claude spark logo  ─────────────── -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <!-- Stylised radial "spark" in Claude coral -->
      <g id="spark">
        <g fill="var(--accent)">
          <path d="M12 1.5c.5 0 .9.4.9.9l.35 6.1 1.2-1.2a.9.9 0 0 1 1.3 1.3l-1.2 1.2 6.1.35a.9.9 0 0 1 0 1.8l-6.1.35 1.2 1.2a.9.9 0 0 1-1.3 1.3l-1.2-1.2-.35 6.1a.9.9 0 0 1-1.8 0l-.35-6.1-1.2 1.2a.9.9 0 0 1-1.3-1.3l1.2-1.2-6.1-.35a.9.9 0 0 1 0-1.8l6.1-.35-1.2-1.2a.9.9 0 0 1 1.3-1.3l1.2 1.2.35-6.1c0-.5.4-.9.9-.9z"/>
        </g>
      </g>
    </defs>
  </svg>

<script>
/* ════════════════════════════════════════════════════════════════════════
   Prototype logic
   Small, dependency-free, and structured so you can extend any single piece.
   ════════════════════════════════════════════════════════════════════════ */

const $ = (sel) => document.querySelector(sel);

const input      = $('#input');
const composer   = $('#composer');
const sendBtn    = $('#send');
const messages   = $('#messages');
const main       = $('#main');
const greetingEl = $('#greeting');

/* ───────────────────────  Models (placeholder data)  ─────────────────── */
const MODELS = [
  { id: 'opus-4-8',   name: 'Opus 4.8',   note: 'Most capable for complex work' },
  { id: 'sonnet-4-6', name: 'Sonnet 4.6', note: 'Smart, fast — everyday default' },
  { id: 'haiku-4-5',  name: 'Haiku 4.5',  note: 'Fastest for lightweight tasks' },
];
let currentModel = 'sonnet-4-6';

function buildModelMenu() {
  const menu = $('#modelMenu');
  menu.innerHTML = MODELS.map(m => `
    <button class="item" role="menuitemradio" data-id="${m.id}"
            aria-checked="${m.id === currentModel}">
      <span>${m.name}<small>${m.note}</small></span>
      <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6L9 17l-5-5"></path>
      </svg>
    </button>`).join('');

  menu.querySelectorAll('.item').forEach(item => {
    item.addEventListener('click', () => {
      currentModel = item.dataset.id;
      $('#modelName').textContent = MODELS.find(m => m.id === currentModel).name;
      buildModelMenu();
      toggleMenu(false);
    });
  });
}

function toggleMenu(force) {
  const menu = $('#modelMenu');
  const open = force !== undefined ? force : !menu.classList.contains('open');
  menu.classList.toggle('open', open);
  $('#modelBtn').setAttribute('aria-expanded', open);
}

$('#modelBtn').addEventListener('click', (e) => { e.stopPropagation(); toggleMenu(); });
document.addEventListener('click', () => toggleMenu(false));
$('#modelMenu').addEventListener('click', (e) => e.stopPropagation());

/* ──────────────────────────  Textarea behaviour  ────────────────────── */

// Auto-grow to fit content (up to the CSS max-height).
function autoGrow() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 220) + 'px';
}

// Toggle the coral "active" state of the send button based on content.
function refreshSendState() {
  const hasText = input.value.trim().length > 0;
  document.body.classList.toggle('has-text', hasText);
  sendBtn.disabled = !hasText;
}

input.addEventListener('input', () => { autoGrow(); refreshSendState(); });

// Enter sends, Shift+Enter inserts a newline.
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    composer.requestSubmit();
  }
});

/* ───────────────────────────  Message flow  ─────────────────────────── */

function scrollToBottom() {
  requestAnimationFrame(() => { main.scrollTop = main.scrollHeight; });
}

// Append a user or assistant message. Returns the created element.
function addMessage(role, text) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  if (role === 'user') {
    el.innerHTML = `<div class="bubble"></div>`;
    el.querySelector('.bubble').textContent = text;
  } else {
    el.innerHTML = `
      <div class="avatar"><svg viewBox="0 0 24 24"><use href="#spark"/></svg></div>
      <div class="body"></div>`;
    el.querySelector('.body').textContent = text;
  }
  messages.appendChild(el);
  scrollToBottom();
  return el;
}

// Show the typing indicator and return a handle to replace it with text.
function showTyping() {
  const el = document.createElement('div');
  el.className = 'msg assistant';
  el.innerHTML = `
    <div class="avatar"><svg viewBox="0 0 24 24"><use href="#spark"/></svg></div>
    <div class="body"><span class="typing"><span></span><span></span><span></span></span></div>`;
  messages.appendChild(el);
  scrollToBottom();
  return el;
}

/*
  Simulated assistant reply.
  ▸ Swap the body of this function for a real fetch() to your API.
  ▸ It currently echoes a canned line after a short "thinking" delay.
*/
function respond(userText) {
  const typingEl = showTyping();
  const reply = `This is a simulated reply. You said: “${userText}”.\n\nHook your interaction logic into respond() to make this real.`;

  setTimeout(() => {
    typingEl.querySelector('.body').textContent = reply;
    scrollToBottom();
  }, 900);
}

// The main send handler.
function sendMessage(text) {
  const trimmed = text.trim();
  if (!trimmed) return;

  // First message: switch from greeting state to conversation state.
  document.body.classList.add('is-conversation');
  input.placeholder = 'Reply to Claude…';

  addMessage('user', trimmed);

  // Reset the composer.
  input.value = '';
  autoGrow();
  refreshSendState();

  respond(trimmed);
}

composer.addEventListener('submit', (e) => {
  e.preventDefault();
  sendMessage(input.value);
});

/* ───────────────────────────  Misc controls  ───────────────────────── */

// Theme toggle (persists for the session).
$('#themeToggle').addEventListener('click', () => {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
});

// Placeholder actions — wire these up to your experiments.
$('#attach').addEventListener('click', () => console.log('[attach] open file picker'));
$('#tools').addEventListener('click', () => console.log('[tools] open tools menu'));

/* ──────────────────────────────  Init  ─────────────────────────────── */
buildModelMenu();
refreshSendState();
input.focus();
</script>
</body>
</html>
